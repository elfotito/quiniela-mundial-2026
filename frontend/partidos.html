<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Resultados - Mundial 2026</title>
    <style>
        :root { --fifa-gold:#FFD700; --dark-bg:#0a0a0a; --dark-card:#1a1a1a; --border:#333; --success:#00aa44; --danger:#cc3333; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--dark-bg);color:#fff;font-family:'Segoe UI',sans-serif;padding:20px}
        .container{max-width:900px;margin:0 auto}
        h1{color:var(--fifa-gold);margin-bottom:30px;text-align:center}
        .tabs{display:flex;gap:10px;margin-bottom:30px;border-bottom:2px solid var(--border)}
        .tab-btn{background:transparent;border:none;color:#999;padding:12px 20px;font-weight:bold;cursor:pointer;border-bottom:3px solid transparent;font-size:16px}
        .tab-btn.active{color:var(--fifa-gold);border-bottom-color:var(--fifa-gold)}
        .tab-content{display:none}.tab-content.active{display:block}
        .fr-section{background:var(--dark-card);padding:20px;border-radius:8px;border:1px solid var(--border);margin-bottom:20px}
        .fr-header{display:flex;align-items:center;gap:15px;margin-bottom:20px}
        .fr-header h2{color:var(--fifa-gold);font-size:18px;flex:1}
        .status-badge{padding:8px 12px;border-radius:20px;font-size:12px;font-weight:bold;background:var(--dark-bg);color:#999}
        .status-badge.loading{color:#ffaa00}.status-badge.success{color:#00aa44}.status-badge.error{color:var(--danger)}
        .btn-traer{background:linear-gradient(135deg,#CC0000,#990000);color:#fff;padding:12px 24px;border:none;border-radius:4px;font-weight:bold;cursor:pointer;font-size:14px}
        .btn-traer:hover{transform:translateY(-2px)}
        .btn-traer:disabled{opacity:0.5;cursor:not-allowed}
        .preview-match{background:var(--dark-bg);padding:15px;border-radius:6px;margin-bottom:12px;border-left:4px solid var(--fifa-gold);cursor:pointer;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
        .preview-match.selected{background:rgba(255,215,0,0.1)}
        .match-teams{display:flex;align-items:center;gap:10px;font-weight:bold;font-size:16px}
        .match-score{font-size:20px;font-weight:800;color:var(--fifa-gold)}
        .match-info{font-size:12px;color:#999}
        .btn-success{background:var(--success);border:none;color:#fff;padding:10px 20px;border-radius:4px;cursor:pointer;font-weight:bold}
        .btn-primary{background:#0066CC;border:none;color:#fff;padding:10px 20px;border-radius:4px;cursor:pointer;font-weight:bold}
        .btn-danger{background:var(--danger);border:none;color:#fff;padding:6px 12px;font-size:12px;border-radius:4px;cursor:pointer}
        .alert{padding:12px;border-radius:4px;margin-bottom:20px;font-size:14px}
        .alert.success{background:rgba(0,170,68,0.1);color:var(--success);border:1px solid rgba(0,170,68,0.3)}
        .alert.error{background:rgba(204,51,51,0.1);color:var(--danger);border:1px solid rgba(204,51,51,0.3)}
        .loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,215,0,0.3);border-top-color:var(--fifa-gold);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div class="container">
    <h1>⚽ Admin Resultados - Mundial 2026</h1>
    <div class="tabs">
        <button class="tab-btn active" onclick="cambiarTab('traer')">Traer de football-data.org</button>
        <button class="tab-btn" onclick="cambiarTab('historial')">Historial de resultados</button>
    </div>

    <div id="tab-traer" class="tab-content active">
        <div class="fr-section">
            <div class="fr-header">
                <h2>🌍 Obtener partidos del Mundial 2026</h2>
                <span class="status-badge" id="status">Listo</span>
            </div>
            <p style="color:#999;margin-bottom:20px;font-size:14px">
                Pulla los últimos partidos finalizados, en vivo y próximos desde football-data.org.
            </p>
            <button class="btn-traer" id="btnTraer" onclick="traerResultados()">📡 Traer Partidos</button>
            <div id="previewContainer" style="margin-top:20px"></div>
            <div style="display:flex;gap:10px;margin-top:20px">
                <button class="btn-success" onclick="guardarSeleccionados()">✅ Guardar Seleccionados</button>
                <button class="btn-primary" onclick="guardarTodos()">📥 Guardar Todos</button>
            </div>
        </div>
    </div>

    <div id="tab-historial" class="tab-content">
        <h2 style="color:var(--fifa-gold);margin-bottom:20px">Partidos guardados</h2>
        <div id="historialList"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const sb = supabase.createClient(
        'https://aohnbafexgwkugtfryrk.supabase.co',
        'sb_publishable_LG2mW2C2kgi_dZrB4C9jgw_cMywfRB8'
    );
    const API_KEY = 'd7ea5324baf74ba6885ffa05df48b59e'; // Tu API key

    let partidosCargados = [];

    function cambiarTab(tab){
        document.querySelectorAll('.tab-content,.tab-btn').forEach(el=>el.classList.remove('active'));
        document.getElementById('tab-'+tab).classList.add('active');
        event.target.classList.add('active');
        if(tab==='historial') cargarHistorial();
    }

    async function traerResultados(){
        const btn = document.getElementById('btnTraer');
        const status = document.getElementById('status');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> Buscando...';
        status.textContent = '⏳ Conectando...';
        status.className = 'status-badge loading';
        try{
            // WC = World Cup (competición oficial en football-data.org)
            const res = await fetch('https://api.football-data.org/v4/competitions/WC/matches?status=FINISHED&status=SCHEDULED&status=LIVE', {
                headers: { 'X-Auth-Token': API_KEY }
            });
            if(!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const matches = data.matches || [];
            if(!matches.length) throw new Error('No se encontraron partidos');

            partidosCargados = matches.map(m => ({
                match_api_id: m.id,
                equipo_local: m.homeTeam.name,
                equipo_visitante: m.awayTeam.name,
                marcador_local: m.score.fullTime.home ?? 0,
                marcador_visitante: m.score.fullTime.away ?? 0,
                fecha_partido: m.utcDate,
                estadio: m.venue || 'Por definir',
                estado: m.status === 'FINISHED' ? 'finalizado' : (m.status === 'LIVE' ? 'en_juego' : 'programado'),
                fuente: 'football-data.org'
            }));
            mostrarPreview();
            status.textContent = `✅ ${partidosCargados.length} partidos`;
            status.className = 'status-badge success';
        }catch(e){
            console.error(e);
            status.textContent = '❌ Error';
            status.className = 'status-badge error';
            alert('Error: '+e.message);
        }finally{
            btn.disabled = false;
            btn.innerHTML = '📡 Traer Partidos';
        }
    }

    function mostrarPreview(){
        const container = document.getElementById('previewContainer');
        container.innerHTML = partidosCargados.map((p,i) => `
            <div class="preview-match" data-idx="${i}" onclick="this.classList.toggle('selected')">
                <div class="match-teams">
                    <span>${p.equipo_local}</span>
                    <span class="match-score">${p.marcador_local} - ${p.marcador_visitante}</span>
                    <span>${p.equipo_visitante}</span>
                </div>
                <div class="match-info">
                    📅 ${new Date(p.fecha_partido).toLocaleDateString('es-CO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})} | 
                    🏟 ${p.estadio} | ${p.estado}
                </div>
            </div>
        `).join('');
    }

    async function guardarSeleccionados(){
        const idxs = Array.from(document.querySelectorAll('.preview-match.selected')).map(el=>parseInt(el.dataset.idx));
        if(!idxs.length) return alert('Selecciona al menos un partido');
        await guardarEnDB(idxs.map(i=>partidosCargados[i]));
    }

    async function guardarTodos(){
        if(!partidosCargados.length) return alert('No hay partidos');
        if(confirm(`¿Guardar ${partidosCargados.length} partidos?`)) await guardarEnDB(partidosCargados);
    }

    async function guardarEnDB(partidos){
        try{
            const {data:existentes} = await sb.from('resultados').select('match_api_id');
            const idsExistentes = new Set((existentes||[]).map(r=>r.match_api_id));
            const nuevos = partidos.filter(p => !idsExistentes.has(p.match_api_id));
            if(!nuevos.length) return alert('Todos los partidos ya existen');
            const {error} = await sb.from('resultados').insert(nuevos);
            if(error) throw error;
            alert(`✅ ${nuevos.length} partidos guardados`);
            if(window.refreshResultadosWidget) window.refreshResultadosWidget();
            if(window.reinicializarWidgetNoticias) window.reinicializarWidgetNoticias();
        }catch(e){
            alert('❌ Error: '+e.message);
        }
    }

    async function cargarHistorial(){
        const list = document.getElementById('historialList');
        try{
            const {data} = await sb.from('resultados').select('*').order('fecha_partido',{ascending:false}).limit(20);
            list.innerHTML = data?.length ? data.map(r=>`
                <div style="background:var(--dark-card);padding:12px;border-radius:6px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border-left:4px solid var(--fifa-gold)">
                    <div>
                        <strong>${r.equipo_local} ${r.marcador_local} - ${r.marcador_visitante} ${r.equipo_visitante}</strong><br>
                        <small>${new Date(r.fecha_partido).toLocaleString()} | ${r.estado}</small>
                    </div>
                    <button class="btn-danger" onclick="eliminarResultado(${r.id})">🗑️</button>
                </div>
            `).join('') : '<p style="color:#999">No hay resultados guardados</p>';
        }catch(e){
            list.innerHTML = '<p style="color:red">Error al cargar</p>';
        }
    }

    async function eliminarResultado(id){
        if(!confirm('¿Eliminar?')) return;
        await sb.from('resultados').delete().eq('id',id);
        cargarHistorial();
    }
</script>
</body>
</html>
